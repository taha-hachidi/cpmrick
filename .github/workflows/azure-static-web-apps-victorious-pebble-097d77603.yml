name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean frontend workspace
        run: |
          rm -rf nexora-digital-frontend/node_modules
          rm -rf nexora-digital-frontend/dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        working-directory: nexora-digital-frontend

      - name: Build frontend
        run: npm run build
        working-directory: nexora-digital-frontend
        env:
          VITE_API_BASE_URL: https://cpmrick-gubcd5fafwc5grcb.francecentral-01.azurewebsites.net/api

      - name: Verify build output
        run: ls -la nexora-digital-frontend/dist

      - name: Deploy frontend
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          app_location: "nexora-digital-frontend/dist"
          output_location: ""
